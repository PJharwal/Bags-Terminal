<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <style>
    .bg { fill: transparent; }
    .connection { fill: none; stroke: rgba(255, 255, 255, 0.12); stroke-width: 1.5; transition: stroke 0.3s, filter 0.3s; }
    .node { fill: #0A0A0A; stroke: rgba(255, 255, 255, 0.3); stroke-width: 2; transition: all 0.3s; cursor: pointer; }
    .node-core { fill: #EDEDED; transition: fill 0.3s; }
    .data-packet { fill: #00F0FF; opacity: 0; filter: drop-shadow(0 0 4px #00F0FF); }
    
    @keyframes pulseNode { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    
    /* Using simple css animation instead of offset-path for better cross browser support on plain SVG */
    @keyframes dashLoop1 { to { stroke-dashoffset: -400; } }
    .active-line { stroke: #00F0FF; stroke-width: 2; stroke-dasharray: 4 200; animation: dashLoop1 3s linear infinite; filter: drop-shadow(0 0 5px #00F0FF); opacity: 0.8;}
    
    svg:hover .connection { stroke: rgba(0, 240, 255, 0.4); }
    .node-group:hover .node { stroke: #00F0FF; filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.6)); animation: pulseNode 1s infinite; transform-origin: center; transform-box: fill-box;}
    .node-group:hover .node-core { fill: #00F0FF; }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <!-- Connections base -->
  <path d="M100 200 L300 100" class="connection" />
  <path d="M300 100 L500 250" class="connection" />
  <path d="M500 250 L700 150" class="connection" />
  <path d="M100 200 L400 300" class="connection" />
  <path d="M400 300 L700 150" class="connection" />
  <path d="M300 100 L400 300" class="connection" stroke-dasharray="4 4"/>
  <path d="M500 250 L400 300" class="connection" stroke-dasharray="4 4"/>

  <!-- Active moving lines representing data -->
  <path d="M100 200 L300 100" class="active-line" fill="none" />
  <path d="M300 100 L500 250" class="active-line" style="animation-duration: 4s; animation-delay: -1s;" fill="none" />
  <path d="M500 250 L700 150" class="active-line" style="animation-duration: 2.5s; animation-delay: -0.5s;" fill="none" />
  <path d="M100 200 L400 300" class="active-line" style="animation-duration: 5s; animation-delay: -2s;" fill="none" />
  <path d="M400 300 L700 150" class="active-line" style="animation-duration: 3.5s; animation-delay: -1.5s;" fill="none" />

  <!-- Nodes -->
  <g class="node-group" transform="translate(100, 200)">
    <circle r="15" class="node" />
    <circle r="4" class="node-core" />
  </g>
  <g class="node-group" transform="translate(300, 100)">
    <circle r="20" class="node" />
    <circle r="6" class="node-core" />
  </g>
  <g class="node-group" transform="translate(500, 250)">
    <circle r="18" class="node" />
    <circle r="5" class="node-core" />
  </g>
  <g class="node-group" transform="translate(700, 150)">
    <circle r="15" class="node" />
    <circle r="4" class="node-core" />
  </g>
  <g class="node-group" transform="translate(400, 300)">
    <circle r="12" class="node" />
    <circle r="3" class="node-core" />
  </g>
  
  <!-- Decorative coordinates -->
  <text x="80" y="230" fill="#666" font-family="monospace" font-size="10">SYS.01</text>
  <text x="280" y="80" fill="#666" font-family="monospace" font-size="10">SYS.02</text>
  <text x="480" y="280" fill="#666" font-family="monospace" font-size="10">SYS.03</text>
  <text x="680" y="180" fill="#666" font-family="monospace" font-size="10">SYS.04</text>
  <text x="380" y="330" fill="#666" font-family="monospace" font-size="10">SYS.05</text>
</svg>
