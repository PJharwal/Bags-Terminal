<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <style>
    .bg { fill: transparent; }
    .eye-outline { fill: none; stroke: #EDEDED; stroke-width: 4; transition: stroke 0.2s; }
    .iris { fill: none; stroke: #39FF14; stroke-width: 3; stroke-dasharray: 4 4; animation: rotateIris 10s linear infinite; transform-origin: center; transform-box: fill-box;}
    .pupil { fill: #EDEDED; transition: fill 0.2s; animation: pulse 2s ease-in-out infinite; }
    
    .glitch-layer-1 { opacity: 0; fill: none; stroke: #FF003C; stroke-width: 4; transform: translate(-5px, 2px); animation: glitchAnim 3s infinite; }
    .glitch-layer-2 { opacity: 0; fill: none; stroke: #00F0FF; stroke-width: 4; transform: translate(5px, -2px); animation: glitchAnim 3s infinite 0.1s; }
    
    @keyframes rotateIris { 100% { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); fill: #39FF14; } }
    @keyframes glitchAnim {
      0%, 89% { opacity: 0; transform: translate(0, 0); }
      90% { opacity: 0.8; transform: translate(-10px, 4px) skew(-5deg); filter: blur(1px); }
      92% { opacity: 0.8; transform: translate(8px, -6px) skew(5deg); filter: blur(0px); }
      94%, 100% { opacity: 0; transform: translate(0, 0); }
    }
    
    svg:hover .eye-outline { stroke: #39FF14; filter: drop-shadow(0 0 5px #39FF14); }
    svg:hover .pupil { fill: #39FF14; }
  </style>
  
  <rect width="500" height="500" class="bg"/>
  
  <g transform="translate(250, 250)">
    <!-- Main Eye -->
    <path class="eye-outline" d="M -150 0 C -80 -80, 80 -80, 150 0 C 80 80, -80 80, -150 0 Z" />
    <circle class="iris" cx="0" cy="0" r="45" />
    <circle class="pupil" cx="0" cy="0" r="15" />
    
    <!-- Glitch Overlays -->
    <g class="glitch-layer-1">
      <path d="M -150 0 C -80 -80, 80 -80, 150 0 C 80 80, -80 80, -150 0 Z" />
      <circle cx="0" cy="0" r="15" fill="#FF003C" stroke="none" />
    </g>
    <g class="glitch-layer-2">
      <path d="M -150 0 C -80 -80, 80 -80, 150 0 C 80 80, -80 80, -150 0 Z" />
      <circle cx="0" cy="0" r="15" fill="#00F0FF" stroke="none" />
    </g>
    
    <!-- Crosshairs -->
    <line x1="-200" y1="0" x2="-180" y2="0" stroke="#EDEDED" stroke-width="2" />
    <line x1="180" y1="0" x2="200" y2="0" stroke="#EDEDED" stroke-width="2" />
    <line x1="0" y1="-120" x2="0" y2="-100" stroke="#EDEDED" stroke-width="2" />
    <line x1="0" y1="100" x2="0" y2="120" stroke="#EDEDED" stroke-width="2" />
  </g>
</svg>
